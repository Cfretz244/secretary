name: Secretary
options:
  bundleIdPrefix: com.secretary
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    version: 7.0.0
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    version: 2.7.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    version: 4.2.2
  SwiftAnthropic:
    url: https://github.com/jamesrochabrun/SwiftAnthropic.git
    from: 2.2.0

targets:
  Secretary:
    type: application
    platform: iOS
    sources:
      - Secretary
    settings:
      base:
        INFOPLIST_FILE: Secretary/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.secretary.ios
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        OTHER_SWIFT_FLAGS: "-DSQLITE_ENABLE_FTS5"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 44KC9KSGZQ
        SWIFT_STRICT_CONCURRENCY: minimal
    dependencies:
      - package: GRDB
        product: GRDB
      - package: SwiftSoup
        product: SwiftSoup
      - package: KeychainAccess
        product: KeychainAccess
      - package: SwiftAnthropic
        product: SwiftAnthropic
    info:
      path: Secretary/Resources/Info.plist
      properties:
        CFBundleName: Secretary
        CFBundleDisplayName: Secretary
        CFBundleIdentifier: com.secretary.ios
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen:
          UIColorName: ""
        NSCalendarsFullAccessUsageDescription: "Secretary needs calendar access to manage your events."
        NSContactsUsageDescription: "Secretary uses your contacts to resolve phone numbers and email addresses to names."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "Secretary connects to the Messages Companion server on your local network."
        BGTaskSchedulerPermittedIdentifiers:
          - $(PRODUCT_BUNDLE_IDENTIFIER).background
